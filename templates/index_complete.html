<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站外链检测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --info-color: #3b82f6;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
        }
        
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            padding: 15px 0;
        }
        
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color) !important;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .navbar-brand i {
            font-size: 1.8rem;
        }
        
        .main-container {
            padding: 30px 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }
        
        .card-header {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-bottom: 1px solid #e2e8f0;
            padding: 16px 20px;
        }
        
        .card-header h5 {
            margin: 0;
            font-weight: 600;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card-body {
            padding: 20px;
        }
        
        .nav-tabs .nav-link {
            border: none;
            color: #64748b;
            font-weight: 500;
            padding: 12px 20px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .nav-tabs .nav-link:hover {
            background: #f1f5f9;
            color: var(--primary-color);
        }
        
        .nav-tabs .nav-link.active {
            background: var(--primary-color);
            color: white;
        }
        
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            padding: 12px 16px;
            transition: all 0.2s;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, #6366f1 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-hover) 0%, #4f46e5 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success-color) 0%, #059669 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: 600;
        }
        
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8fafc;
        }
        
        .upload-area:hover {
            border-color: var(--primary-color);
            background: #f1f5f9;
        }
        
        .upload-area.dragover {
            border-color: var(--success-color);
            background: #ecfdf5;
        }
        
        .upload-area i {
            font-size: 3rem;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        
        #screenshotContainer {
            position: relative;
            display: inline-block;
            max-width: 100%;
            margin-top: 15px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        #screenshotImg {
            max-width: 100%;
            display: block;
        }
        
        #selectionBox {
            position: absolute;
            border: 3px solid var(--danger-color);
            background-color: rgba(239, 68, 68, 0.1);
            pointer-events: none;
            display: none;
            border-radius: 4px;
        }
        
        .stats-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s;
        }
        
        .stats-card:hover {
            transform: translateY(-3px);
        }
        
        .stats-card .icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 1.5rem;
        }
        
        .stats-card .number {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stats-card .label {
            color: #64748b;
            font-weight: 500;
        }
        
        .stats-card.total .icon { background: #e0e7ff; color: var(--primary-color); }
        .stats-card.total .number { color: var(--primary-color); }
        
        .stats-card.critical .icon { background: #fee2e2; color: var(--danger-color); }
        .stats-card.critical .number { color: var(--danger-color); }
        
        .stats-card.high .icon { background: #ffedd5; color: #ea580c; }
        .stats-card.high .number { color: #ea580c; }
        
        .stats-card.medium .icon { background: #fef3c7; color: var(--warning-color); }
        .stats-card.medium .number { color: var(--warning-color); }
        
        .stats-card.low .icon { background: #d1fae5; color: var(--success-color); }
        .stats-card.low .number { color: var(--success-color); }
        
        .table {
            border-radius: 12px;
            overflow: hidden;
        }
        
        .table thead th {
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            font-weight: 600;
            color: #475569;
            padding: 14px 16px;
            white-space: nowrap;
        }
        
        .table tbody td {
            padding: 14px 16px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .table tbody tr:hover {
            background: #f8fafc;
        }
        
        .risk-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        .risk-critical { background: #fee2e2; color: var(--danger-color); }
        .risk-high { background: #ffedd5; color: #ea580c; }
        .risk-medium { background: #fef3c7; color: #d97706; }
        .risk-low { background: #d1fae5; color: var(--success-color); }
        
        .screenshot-thumb {
            max-width: 120px;
            max-height: 80px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #e2e8f0;
        }
        
        .screenshot-thumb:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .loading-content {
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
        }
        
        .loading-content .spinner-border {
            width: 3rem;
            height: 3rem;
            margin-bottom: 15px;
        }
        
        .link-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: #f8fafc;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        
        .link-item:hover {
            background: #f1f5f9;
        }
        
        .link-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            accent-color: var(--primary-color);
        }
        
        .link-item label {
            flex: 1;
            cursor: pointer;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #334155;
        }
        
        .url-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }
        
        .url-link:hover {
            text-decoration: underline;
        }
        
        textarea {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
        }
        
        .footer {
            text-align: center;
            padding: 30px;
            color: white;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <nav class="navbar sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="bi bi-link-45deg"></i>
                网站外链检测系统
            </span>
        </div>
    </nav>
    
    <div class="main-container">
        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card h-100">
                    <div class="card-header">
                        <ul class="nav nav-tabs card-header-tabs" role="tablist">
                            <li class="nav-item">
                                <a class="nav-link active" data-bs-toggle="tab" href="#auto">
                                    <i class="bi bi-camera"></i> 截图识别
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" data-bs-toggle="tab" href="#manual">
                                    <i class="bi bi-pencil"></i> 手动输入
                                </a>
                            </li>
                        </ul>
                    </div>
                    <div class="card-body tab-content">
                        <div class="tab-pane fade show active" id="auto">
                            <div class="mb-4">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-globe"></i> 网站地址
                                </label>
                                <input type="url" class="form-control" id="autoUrl" placeholder="https://example.com">
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-image"></i> 上传网页截图
                                </label>
                                <div class="upload-area" id="uploadArea" onclick="document.getElementById('screenshotInput').click()">
                                    <input type="file" id="screenshotInput" accept="image/*" style="display:none">
                                    <i class="bi bi-cloud-arrow-up"></i>
                                    <p class="mb-1 fw-semibold">点击或拖拽上传截图</p>
                                    <small class="text-muted">支持 PNG, JPG 格式</small>
                                </div>
                            </div>
                            
                            <div id="screenshotPreview" style="display:none;">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-crop"></i> 在截图上框选友情链接区域
                                </label>
                                <div id="screenshotContainer">
                                    <img id="screenshotImg" src="" alt="截图预览">
                                    <div id="selectionBox"></div>
                                </div>
                                <div id="selectionInfo" class="mt-2 text-muted small"></div>
                            </div>
                            
                            <button class="btn btn-primary w-100" onclick="crawlAuto()">
                                <i class="bi bi-search"></i> 开始爬取
                            </button>
                        </div>
                        
                        <div class="tab-pane fade" id="manual">
                            <div class="mb-4">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-list-ul"></i> 链接地址（每行一个URL）
                                </label>
                                <textarea class="form-control" id="manualUrls" rows="12" placeholder="https://example1.com
https://example2.com"></textarea>
                            </div>
                            <button class="btn btn-primary w-100" onclick="checkBatchLinks()">
                                <i class="bi bi-check-circle"></i> 开始检查链接
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-7">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5><i class="bi bi-list-check"></i> 链接列表</h5>
                        <span id="linkCount" class="badge bg-secondary">0 个链接</span>
                    </div>
                    <div class="card-body">
                        <div id="linksList" style="max-height: 450px; overflow-y: auto;"></div>
                        <button class="btn btn-success w-100 mt-3" onclick="startCheck()" id="checkBtn" style="display:none;">
                            <i class="bi bi-rocket-takeoff"></i> 开始批量检查
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="loading-overlay" id="loading">
            <div class="loading-content">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mb-0 fw-semibold" id="loadingText">正在处理...</p>
            </div>
        </div>
        
        <div id="resultsSection" style="display:none;" class="mt-4">
            <div class="row g-4 mb-4">
                <div class="col-md-2 col-4">
                    <div class="stats-card total">
                        <div class="icon"><i class="bi bi-link-45deg"></i></div>
                        <div class="number" id="statTotal">0</div>
                        <div class="label">总链接数</div>
                    </div>
                </div>
                <div class="col-md-2 col-4">
                    <div class="stats-card critical">
                        <div class="icon"><i class="bi bi-exclamation-octagon"></i></div>
                        <div class="number" id="statCritical">0</div>
                        <div class="label">严重风险</div>
                    </div>
                </div>
                <div class="col-md-2 col-4">
                    <div class="stats-card high">
                        <div class="icon"><i class="bi bi-exclamation-triangle"></i></div>
                        <div class="number" id="statHigh">0</div>
                        <div class="label">高风险</div>
                    </div>
                </div>
                <div class="col-md-2 col-4">
                    <div class="stats-card medium">
                        <div class="icon"><i class="bi bi-exclamation-circle"></i></div>
                        <div class="number" id="statMedium">0</div>
                        <div class="label">中等风险</div>
                    </div>
                </div>
                <div class="col-md-2 col-4">
                    <div class="stats-card low">
                        <div class="icon"><i class="bi bi-check-circle"></i></div>
                        <div class="number" id="statLow">0</div>
                        <div class="label">低风险</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h5><i class="bi bi-table"></i> 检测结果</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>链接名称</th>
                                    <th>链接地址</th>
                                    <th>风险等级</th>
                                    <th>风险分数</th>
                                    <th>风险因素</th>
                                    <th>网站截图</th>
                                </tr>
                            </thead>
                            <tbody id="resultsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>网站外链检测系统 &copy; 2024</p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentLinks = [];
        let selectionCoordinates = null;
        let isSelecting = false;
        let startX, startY;
        
        document.getElementById('screenshotInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.getElementById('screenshotImg');
                    img.src = event.target.result;
                    document.getElementById('screenshotPreview').style.display = 'block';
                    document.getElementById('uploadArea').style.display = 'none';
                    initSelection();
                };
                reader.readAsDataURL(file);
            }
        });
        
        const uploadArea = document.getElementById('uploadArea');
        uploadArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', function(e) {
            this.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                document.getElementById('screenshotInput').files = e.dataTransfer.files;
                document.getElementById('screenshotInput').dispatchEvent(new Event('change'));
            }
        });
        
        function initSelection() {
            const container = document.getElementById('screenshotContainer');
            const img = document.getElementById('screenshotImg');
            const selectionBox = document.getElementById('selectionBox');
            
            container.onmousedown = function(e) {
                if (e.target !== img) return;
                isSelecting = true;
                const rect = img.getBoundingClientRect();
                startX = e.clientX - rect.left;
                startY = e.clientY - rect.top;
                selectionBox.style.left = startX + 'px';
                selectionBox.style.top = startY + 'px';
                selectionBox.style.width = '0px';
                selectionBox.style.height = '0px';
                selectionBox.style.display = 'block';
            };
            
            container.onmousemove = function(e) {
                if (!isSelecting) return;
                const rect = img.getBoundingClientRect();
                const currentX = e.clientX - rect.left;
                const currentY = e.clientY - rect.top;
                
                const width = currentX - startX;
                const height = currentY - startY;
                
                selectionBox.style.left = (width < 0 ? currentX : startX) + 'px';
                selectionBox.style.top = (height < 0 ? currentY : startY) + 'px';
                selectionBox.style.width = Math.abs(width) + 'px';
                selectionBox.style.height = Math.abs(height) + 'px';
            };
            
            container.onmouseup = function(e) {
                if (!isSelecting) return;
                isSelecting = false;
                
                const rect = img.getBoundingClientRect();
                const endX = e.clientX - rect.left;
                const endY = e.clientY - rect.top;
                
                const x = Math.min(startX, endX);
                const y = Math.min(startY, endY);
                const width = Math.abs(endX - startX);
                const height = Math.abs(endY - startY);
                
                const scaleX = img.naturalWidth / rect.width;
                const scaleY = img.naturalHeight / rect.height;
                
                selectionCoordinates = {
                    x: Math.round(x * scaleX),
                    y: Math.round(y * scaleY),
                    width: Math.round(width * scaleX),
                    height: Math.round(height * scaleY),
                    imgWidth: img.naturalWidth,
                    imgHeight: img.naturalHeight
                };
                
                document.getElementById('selectionInfo').innerHTML = 
                    '<i class="bi bi-check-circle text-success"></i> 已选择区域: (' + selectionCoordinates.x + ', ' + selectionCoordinates.y + ') - ' + 
                    selectionCoordinates.width + 'x' + selectionCoordinates.height + 'px';
            };
        }
        
        function showLoading(text) {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loadingText').textContent = text;
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        function isValidUrl(string) {
            try { new URL(string); return true; } catch (_) { return false; }
        }
        
        function extractDomain(url) {
            try { return new URL(url).hostname; } catch (_) { return url; }
        }
        
        async function crawlAuto() {
            const url = document.getElementById('autoUrl').value;
            if (!url) { alert('请输入网站地址'); return; }
            
            showLoading('正在智能识别友情链接...');
            
            try {
                const requestData = {url: url};
                
                const img = document.getElementById('screenshotImg');
                if (img && img.src && img.src.startsWith('data:image')) {
                    requestData.screenshot = img.src;
                    if (selectionCoordinates) {
                        requestData.coordinates = selectionCoordinates;
                    }
                }
                
                const response = await fetch('/api/crawl', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(requestData)
                });
                const data = await response.json();
                
                if (data.success) {
                    currentLinks = data.links;
                    displayLinks(data.links);
                    alert('成功找到 ' + data.count + ' 个友情链接');
                } else {
                    alert(data.error || '未找到友情链接');
                }
            } catch (error) {
                alert('请求失败: ' + error.message);
            } finally {
                hideLoading();
            }
        }
        
        async function checkBatchLinks() {
            const textarea = document.getElementById('manualUrls').value;
            const lines = textarea.split('\n').map(line => line.trim()).filter(line => line);
            
            if (lines.length === 0) { alert('请输入至少一个URL地址'); return; }
            
            const links = [];
            lines.forEach(line => {
                let url = line;
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'http://' + url;
                }
                if (isValidUrl(url)) {
                    links.push({name: extractDomain(url), url: url});
                }
            });
            
            if (links.length === 0) { alert('没有有效的URL地址'); return; }
            
            showLoading('正在检查 ' + links.length + ' 个链接...');
            
            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({links: links})
                });
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data.results);
                    updateStats(data.statistics);
                } else {
                    alert('检查失败');
                }
            } catch (error) {
                alert('请求失败: ' + error.message);
            } finally {
                hideLoading();
            }
        }
        
        function displayLinks(links) {
            const container = document.getElementById('linksList');
            let html = '';
            links.forEach(function(link, i) {
                html += '<div class="link-item">' +
                    '<input type="checkbox" checked id="link' + i + '">' +
                    '<label for="link' + i + '" title="' + link.url + '">' +
                    (link.name || link.url) + '</label></div>';
            });
            container.innerHTML = html;
            document.getElementById('linkCount').textContent = links.length + ' 个链接';
            document.getElementById('checkBtn').style.display = 'block';
        }
        
        async function startCheck() {
            const links = [];
            currentLinks.forEach(function(link, i) {
                const checkbox = document.getElementById('link' + i);
                if (checkbox && checkbox.checked) {
                    links.push(link);
                }
            });
            
            if (links.length === 0) { alert('请选择要检查的链接'); return; }
            
            showLoading('正在检查 ' + links.length + ' 个链接...');
            
            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({links: links})
                });
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data.results);
                    updateStats(data.statistics);
                } else {
                    alert('检查失败');
                }
            } catch (error) {
                alert('请求失败: ' + error.message);
            } finally {
                hideLoading();
            }
        }
        
        function displayResults(results) {
            document.getElementById('resultsSection').style.display = 'block';
            const tbody = document.getElementById('resultsTable');
            let html = '';
            results.forEach(function(r) {
                let screenshotHtml = '<span class="text-muted">无截图</span>';
                if (r['网站截图']) {
                    screenshotHtml = '<img src="/' + r['网站截图'] + '" class="screenshot-thumb" onclick="window.open(this.src)">';
                }
                
                const riskLevel = r['风险等级'];
                const riskClass = 'risk-' + riskLevel.toLowerCase();
                
                html += '<tr>' +
                    '<td><strong>' + r['链接名称'] + '</strong></td>' +
                    '<td><a href="' + r['链接地址'] + '" target="_blank" class="url-link">' + r['链接地址'] + '</a></td>' +
                    '<td><span class="risk-badge ' + riskClass + '">' + riskLevel + '</span></td>' +
                    '<td><strong>' + r['总风险分数'] + '</strong></td>' +
                    '<td><small class="text-muted">' + r['风险因素'].slice(0, 2).join('; ') + '</small></td>' +
                    '<td>' + screenshotHtml + '</td>' +
                    '</tr>';
            });
            tbody.innerHTML = html;
        }
        
        function updateStats(stats) {
            document.getElementById('statTotal').textContent = stats.total;
            document.getElementById('statCritical').textContent = stats.critical;
            document.getElementById('statHigh').textContent = stats.high;
            document.getElementById('statMedium').textContent = stats.medium;
            document.getElementById('statLow').textContent = stats.low;
        }
    </script>
</body>
</html>
